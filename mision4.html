<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mission 4 - Sergio l'Architecte</title>
    <!-- CSS -->
    <link rel="stylesheet" href="./style4.css">
</head>
<body>
    <div id="tablet-frame">
        <div id="toolbox">
            <div class="tool-item" id="btn-pencil">
                <img src="https://img.icons8.com/fluency/48/pencil.png">
                <span>CRAYON</span>
            </div>
            <div class="formula-display">a² + b² = c²</div>
        </div>

        <div id="blueprint-container">
            <div id="header-info">
                <span id="label-defis">DÉFI <span id="num-ex">1</span> / 5</span>
                <h2 id="title-mission">Chargement...</h2>
            </div>
            
            <div id="drawing-area" style="background-image: url('./mision4.png');">
                <canvas id="main-canvas"></canvas>
                <div id="tag-a" class="measure-tag"></div>
                <div id="tag-b" class="measure-tag"></div>
                <div id="tag-c" class="measure-tag"></div>
            </div>

            <div id="instruction-footer">
                <p id="problem-desc">Clique sur "Lire" pour commencer.</p>
            </div>
        </div>

        <div id="steps-sidebar">
            <h3>Modélisation</h3>
            <div class="step-box active" id="s1">1. Lire 📖</div>
            <div class="step-box locked" id="s2">2. Dessiner ✏️</div>
            <div class="step-box locked" id="s3">3. Calculer 🖩</div>
        </div>
    </div>

    <div id="calc-modal" class="hidden">
        <div id="calc-body">
            <div id="calc-screen">0</div>
            <div class="calc-grid">
                <button class="num-btn">7</button><button class="num-btn">8</button><button class="num-btn">9</button><button class="op-btn">*</button>
                <button class="num-btn">4</button><button class="num-btn">5</button><button class="num-btn">6</button><button class="op-btn">-</button>
                <button class="num-btn">1</button><button class="num-btn">2</button><button class="num-btn">3</button><button class="op-btn">+</button>
                <button id="clr-btn" style="background:#ff7675">C</button><button class="num-btn">0</button><button id="sqrt-btn" class="op-btn">√</button><button id="equal-btn">=</button>
            </div>
            <button id="btn-validar">VALIDER LA RÉPONSE</button>
        </div>
    </div>

    <div id="msg-overlay" class="hidden">
        <div id="msg-box">
            <h2 id="msg-title"></h2>
            <p id="msg-text"></p>
            <button id="msg-btn">D'ACCORD</button>
        </div>
    </div>

    <!-- JS -->
    <script src="./script4.js"></script>
</body>
</html>
