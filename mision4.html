<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mission 4 - Sergio l'Architecte</title>
    <link rel="stylesheet" href="style4.css">
</head>
<body>
    <div id="tablet-frame">
        <div id="toolbox">
            <div class="tool-item" id="btn-pencil" onclick="enableDrawing()">
                <img src="https://img.icons8.com/fluency/48/pencil.png">
                <span>CRAYON</span>
            </div>
            <div class="formula-display">a² + b² = c²</div>
        </div>

        <div id="blueprint-container">
            <div id="header-info">
                <span id="label-defis">DÉFI <span id="num-ex">1</span> / 5</span>
                <h2 id="title-mission">Chargement...</h2>
            </div>
            
            <div id="drawing-area">
                <canvas id="main-canvas"></canvas>
                <div id="tag-a" class="measure-tag"></div>
                <div id="tag-b" class="measure-tag"></div>
                <div id="tag-c" class="measure-tag"></div>
            </div>

            <div id="instruction-footer">
                <p id="problem-desc">Clique sur "Lire" pour voir l'énoncé.</p>
            </div>
        </div>

        <div id="steps-sidebar">
            <h3>Modélisation</h3>
            <div class="step-box active" id="s1">1. Lire 📖</div>
            <div class="step-box locked" id="s2" onclick="doStep(2)">2. Dessiner ✏️</div>
            <div class="step-box locked" id="s3" onclick="doStep(3)">3. Calculer 🖩</div>
        </div>
    </div>

    <div id="calc-modal" class="hidden">
        <div id="calc-body">
            <div id="calc-screen">0</div>
            <div class="calc-grid">
                <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button><button class="op" onclick="press('*')">×</button>
                <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button><button class="op" onclick="press('-')">-</button>
                <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button><button class="op" onclick="press('+')">+</button>
                <button onclick="cls()" style="background:#ff7675">C</button><button onclick="press('0')">0</button><button class="op" onclick="solveSqrt()">√</button><button onclick="solve()">=</button>
            </div>
            <button id="btn-validar" onclick="verify()">VALIDER LA RÉPONSE</button>
        </div>
    </div>

    <div id="msg-overlay" class="hidden">
        <div id="msg-box">
            <h2 id="msg-title"></h2>
            <p id="msg-text"></p>
            <button id="msg-btn" onclick="closeMsg()">D'ACCORD</button>
        </div>
    </div>

    <script src="script4.js"></script>
</body>
</html>
