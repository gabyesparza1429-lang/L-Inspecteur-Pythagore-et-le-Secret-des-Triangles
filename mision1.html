<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'Inspecteur Pythagore - Mission 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-viewport">
        <div id="game-container">
            <div id="instruction-panel">
                <div id="progress-tag">Niveau <span id="current-ex">1</span> / 10</div>
                <p id="guide-text">Glisse les mesures sur le triangle.</p>
            </div>

            <canvas id="drawing-canvas"></canvas>

            <div id="inventory">
                <div class="draggable" draggable="true" id="val1">?</div>
                <div class="draggable" draggable="true" id="val2">?</div>
            </div>

            <div class="drop-label" id="label-a">?</div>
            <div class="drop-label" id="label-b">?</div>

            <div id="step-panel" class="hidden">
                <h3 style="text-align:center; color:#2ecc71; margin-bottom:10px;">Calculs</h3>
                <div class="step">a² = <input type="number" id="step-a2"></div>
                <div class="step">b² = <input type="number" id="step-b2"></div>
                <div class="step">Somme = <input type="number" id="step-sum"></div>
                <div class="step">√ (Racine) = <input type="number" id="step-sqrt"></div>

                <div id="calc-integration">
                    <button id="calc-toggle" onclick="toggleCalc()">🖩 CALCULATRICE</button>
                    
<div id="mini-calc" class="hidden">
    <div id="calc-display">0</div>
    <div class="calc-buttons">
        <button onclick="calcInput('7')">7</button><button onclick="calcInput('8')">8</button><button onclick="calcInput('9')">9</button><button class="op" onclick="calcOp('*')">×</button>
        <button onclick="calcInput('4')">4</button><button onclick="calcInput('5')">5</button><button onclick="calcInput('6')">6</button><button class="op" onclick="calcOp('-')">-</button>
        <button onclick="calcInput('1')">1</button><button onclick="calcInput('2')">2</button><button onclick="calcInput('3')">3</button><button class="op" onclick="calcOp('+')">+</button>
        <button onclick="calcClear()" style="background:#e74c3c">C</button><button onclick="calcInput('0')">0</button>
        <button onclick="calcRes()" style="background:#2ecc71">=</button>
        <button class="op" onclick="calcSqrt()" style="background:#9b59b6">√</button>
    </div>
</div>

            <div id="bravo-modal" class="modal hidden">
                <div class="modal-content">
                    <div class="star">⭐</div>
                    <h2>TRES BIEN, SERGIO !</h2>
                    <p>L'hypoténuse n'a plus de secrets pour toi.</p>
                    <button onclick="nextLevel()">SUIVANT ➔</button>
                </div>
            </div>

            <div id="error-modal" class="modal hidden">
                <div class="modal-content" style="border-color: #e74c3c;">
                    <div class="star">⚠️</div>
                    <h2 style="color: #e74c3c;">ATTENTION, SERGIO !</h2>
                    <p id="error-msg">Message d'erreur.</p>
                    <button onclick="closeError()" style="background:#e74c3c;">ESSAYER À NOUVEAU</button>
                </div>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
