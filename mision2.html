<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission 2 - Le Côté Manquant</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div id="game-viewport">
        <div id="game-container">
            <div id="instruction-panel">
                <div id="progress-tag">Niveau <span id="current-ex">1</span> / 10</div>
                <p id="guide-text">Glisse l'hypoténuse (le plus grand) en premier !</p>
            </div>

            <canvas id="drawing-canvas"></canvas>

            <div id="inventory">
                <div class="draggable" draggable="true" id="val-hypo">?</div>
                <div class="draggable" draggable="true" id="val-cote">?</div>
            </div>

            <div class="drop-label" id="label-c">?</div> <div class="drop-label" id="label-b">?</div> <div id="step-panel" class="hidden">
                <h3 style="font-size:12px; color:#e74c3c; margin-bottom:5px;">SOUSTRACTION (Resta)</h3>
                <div class="step">c² (Hypo) = <input type="number" id="step-c2"></div>
                <div class="step">a² (Côté) = <input type="number" id="step-a2"></div>
                <div class="step">c² - a² = <input type="number" id="step-minus"></div>
                <div class="step">√ (Racine) = <input type="number" id="step-sqrt"></div>
            </div>

            <div id="bravo-modal" class="modal hidden">
                <div class="modal-content">
                    <div class="star">🔑</div>
                    <h2>BIEN JOUÉ SERGIO !</h2>
                    <p>Tu as trouvé le côté secret.</p>
                    <button onclick="nextLevel()">SUIVANT ➔</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script2.js"></script>
</body>
</html>
