<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pythagore Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="drawing-canvas"></canvas>

        <div id="inventory">
            <div class="draggable" draggable="true">3</div>
            <div class="draggable" draggable="true">4</div>
        </div>

        <div class="drop-label" id="label-a">?</div>
        <div class="drop-label" id="label-b">?</div>

        <div id="step-panel" class="hidden">
            <div class="step">a² (3x3) = <input type="number" id="step-a2"></div>
            <div class="step">b² (4x4) = <input type="number" id="step-b2"></div>
            <div class="step">Somme = <input type="number" id="step-sum"></div>
            <div class="step">√ (Racine) = <input type="number" id="step-sqrt"></div>
            <button onclick="alert('Bravo Sergio!')" style="width:100%; padding:10px; background:#2ecc71; border:none; color:white; font-weight:bold; border-radius:5px;">VÉRIFIER</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
