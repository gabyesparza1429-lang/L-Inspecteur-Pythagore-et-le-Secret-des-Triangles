<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pythagore Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="bubble">
            <b>AIDE:</b> Sergio, dessine le triangle et place le 3 et le 4!
        </div>

        <canvas id="drawing-canvas"></canvas>

        <div id="inventory">
            <div class="draggable" draggable="true">3</div>
            <div class="draggable" draggable="true">4</div>
        </div>

        <div id="formula-zone">
            <div class="drop-target">?</div><span>² +</span>
            <div class="drop-target">?</div><span>² = c²</span>
        </div>

        <button id="check-btn" class="hidden" onclick="verifier()">VÉRIFIER</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
