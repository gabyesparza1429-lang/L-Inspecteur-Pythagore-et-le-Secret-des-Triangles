<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission 1 - L'Hypoténuse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-viewport">
        <div id="game-container">
            <div id="instruction-panel">
                <span id="guide-text">1. Glisse les mesures sur le triangle.</span>
                <div id="progress-bar">Exercice: <span id="current-ex">1</span> / 10</div>
            </div>

            <canvas id="drawing-canvas"></canvas>

            <div id="inventory">
                <div class="draggable" draggable="true" id="val1">?</div>
                <div class="draggable" draggable="true" id="val2">?</div>
            </div>

            <div class="drop-label" id="label-a">?</div>
            <div class="drop-label" id="label-b">?</div>

            <div id="step-panel" class="hidden">
                <div class="step">a² = <input type="number" id="step-a2"></div>
                <div class="step">b² = <input type="number" id="step-b2"></div>
                <div class="step">Somme = <input type="number" id="step-sum"></div>
                <div class="step">√ (Racine) = <input type="number" id="step-sqrt"></div>
            </div>

            <div id="bravo-modal" class="modal hidden">
                <div class="modal-content">
                    <h2>🌟 BRAVO SERGIO ! 🌟</h2>
                    <p>C'est correct ! Tu es un champion.</p>
                    <button onclick="nextLevel()">CONTINUER</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
