<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'Inspecteur Pythagore - Mission 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-viewport">
        <div id="game-container">
            <div id="instruction-panel">
                <div id="progress-tag">Niveau <span id="current-ex">1</span> / 10</div>
                <p id="guide-text">Glisse les mesures sur le triangle.</p>
            </div>

            <canvas id="drawing-canvas"></canvas>

            <div id="inventory">
                <div class="draggable" draggable="true" id="val1">?</div>
                <div class="draggable" draggable="true" id="val2">?</div>
            </div>

            <div class="drop-label" id="label-a">?</div>
            <div class="drop-label" id="label-b">?</div>

            <div id="step-panel" class="hidden">
                <div class="step">a² = <input type="number" id="step-a2"></div>
                <div class="step">b² = <input type="number" id="step-b2"></div>
                <div class="step">Somme = <input type="number" id="step-sum"></div>
                <div class="step">√ (Racine) = <input type="number" id="step-sqrt"></div>
            </div>

            <div id="bravo-modal" class="modal hidden">
                <div class="modal-content">
                    <div class="star">⭐</div>
                    <h2>TRES BIEN, SERGIO !</h2>
                    <p>Le triangle n'a plus de secrets pour toi.</p>
                    <button onclick="nextLevel()">SUIVANT ➔</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
