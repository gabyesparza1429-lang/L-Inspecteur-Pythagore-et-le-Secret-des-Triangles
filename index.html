<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>L'Inspecteur Pythagore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <img src="images/mision1.png" id="background-img" class="mission-bg">
        
        <div id="guide-sergio" class="bubble">
            <p id="instruction-text">Bonjour Sergio ! Dessine d'abord le triangle.</p>
        </div>

        <canvas id="drawing-canvas"></canvas>

        <div id="inventory">
            <div class="draggable" draggable="true" id="val-3" data-value="3">3</div>
            <div class="draggable" draggable="true" id="val-4" data-value="4">4</div>
        </div>

        <div id="formula-zone">
            <div class="drop-target" id="target-a">?</div>
            <span>² + </span>
            <div class="drop-target" id="target-b">?</div>
            <span>² = c²</span>
        </div>

        <div class="button-group">
            <button id="help-btn" onclick="prochaineEtape()">AIDE / AIDEZ-MOI</button>
            <button id="check-btn" class="hidden" onclick="verifier()">VÉRIFIER</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
