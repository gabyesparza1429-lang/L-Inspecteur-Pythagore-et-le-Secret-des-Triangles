<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>L'Inspecteur Pythagore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <img src="images/mision%201.png" id="background-img" class="mission-bg">
        
        <div id="inspector-hint" class="hint-bubble">
            <p id="hint-text">¡Hola Sergio! Empieza dibujando el triángulo sobre la cuadrícula.</p>
        </div>

        <canvas id="drawing-canvas"></canvas>

        <div id="inventory">
            <div class="draggable" draggable="true" id="val-3" data-value="3">3</div>
            <div class="draggable" draggable="true" id="val-4" data-value="4">4</div>
        </div>

        <div id="formula-drop-zone">
            <div class="drop-target" id="target-a">?</div>
            <span>² + </span>
            <div class="drop-target" id="target-b">?</div>
            <span>² = c²</span>
        </div>

        <div class="controls">
            <button id="help-btn" onclick="darPista()">Obtenir de l'aide</button>
            <button id="check-btn" class="hidden" onclick="verificarMision1()">Calculer l'Hypoténuse</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
